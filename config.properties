# ============================================================
#  config.properties  —  CONFIGURACIÓN EXTERNA (FUERA DEL JAR)
#  Este archivo se distribuye JUNTO al JAR, no dentro.
#  El usuario/cliente puede modificar estos valores.
#  Solo necesita contener las claves que desea sobreescribir.
#  Si no existe este archivo, el sistema usa los defaults internos.
# ============================================================

# Ejemplo: el cliente quiere cambiar el idioma a inglés
app.language=es

# Ejemplo: limitar nombres a 30 caracteres en este despliegue
person.name.max=30